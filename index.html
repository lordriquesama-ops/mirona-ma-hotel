
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cpath fill='%230f4c5c' d='M0 0h512v512H0z'/%3E%3Cpath fill='%23fff' d='M256 160l-128 224h256z'/%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f4c5c" />
    <meta name="description" content="Mirona Ma Hotel Management System" />    <link rel="manifest" href="/manifest.json" />
    <title>Mirona Ma Hotel</title>
    <style>
      body {
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      
      @media print {
        /* GLOBAL: Hide App Shell Elements */
        aside, header, .print\:hidden, nav {
           display: none !important;
        }

        /* DEFAULT: A4/Inkjet Report Layout */
        @page { 
            margin: 1cm;
            size: auto;
        }
        
        body {
            background: white !important;
            color: black !important;
            width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            font-size: 12pt;
        }

        #root {
            width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        /* Utilities to help reports page break correctly */
        .print\:block { display: block !important; }
        .print\:flex { display: flex !important; }
        .print\:table-footer-group { display: table-footer-group !important; }
        tr { break-inside: avoid; }

        /* SCENARIO: THERMAL RECEIPT */
        /* If the #printable-receipt element exists, we hide EVERYTHING else and focus on it */
        /* Note: Using :has() for modern browsers support */
        
        body:has(#printable-receipt) > * {
            visibility: hidden;
        }
        
        body:has(#printable-receipt) #printable-receipt {
            visibility: visible;
            position: absolute;
            top: 0;
            left: 0;
            width: 80mm !important; /* Force Thermal Width */
            font-family: 'Courier New', monospace !important;
            font-size: 12px !important;
            padding: 0 !important;
            margin: 0 !important;
        }
        
        /* Fallback logic for older browsers: wrapper in Bookings.tsx handles absolute positioning overlay */
      }
    </style>
<link rel="stylesheet" href="./index.css">
</head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(r => console.log('SW registered'))
            .catch(e => console.warn('SW registration failed:', e.message));
        });
      }
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
